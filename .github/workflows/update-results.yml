# ═══════════════════════════════════════════════════════════════
#  GitHub Actions — עדכון תוצאות אוטומטי
#  רץ כל 3 שעות (00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC)
#  אפשר גם להריץ ידנית מלשונית Actions
# ═══════════════════════════════════════════════════════════════
name: Update World Cup Results
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update team names
        env:
          FOOTBALL_API_KEY:     ${{ secrets.FOOTBALL_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON:        ${{ secrets.SUPABASE_ANON }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: node update-teams.js

      - name: Run update script
        env:
          FOOTBALL_API_KEY:     ${{ secrets.FOOTBALL_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON:        ${{ secrets.SUPABASE_ANON }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: node update-results.js
